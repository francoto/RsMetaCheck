<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RsMetaCheck Pitfalls Report</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #ffffff;
            color: #333333;
            margin: 0;
            padding: 20px;
        }
        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 30px;
        }
        .table-container {
            max-width: 1200px;
            margin: 0 auto;
            overflow-x: auto;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            border-radius: 8px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background-color: #fff;
        }
        th, td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid #e0e0e0;
        }
        th {
            background-color: #f8f9fa;
            font-weight: 600;
            color: #2c3e50;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        tbody:hover {
            background-color: #f5f5f5;
        }
        .repo-link {
            color: #3498db;
            text-decoration: none;
            word-break: break-all;
        }
        .repo-link:hover {
            text-decoration: underline;
        }
        .code-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.85em;
            font-weight: bold;
        }
        .code-p {
            background-color: #ffebee;
            color: #c0392b;
            border: 1px solid #ffcdd2;
        }
        .code-w {
            background-color: #fff8e1;
            color: #e67e22;
            border: 1px solid #ffecb3;
        }
        .desc-text {
            font-size: 0.9em;
            color: #666;
            margin-top: 4px;
        }
    </style>
</head>
<body>

    <h1>Repository Assessment Report</h1>
    
    <p style="text-align: center; color: #444; font-size: 1.05em; line-height: 1.4;">
        Total repositories studied: 200 extracted<br>
        Every repository being studied has codemeta.json, and at least one metadata file<br>
        Currently: Covered 150 out 200 repository
    </p>
    
    <div class="table-container">
        <table id="pitfallsTable">
            <thead>
                <tr>
                    <th>Repository</th>
                    <th>Pitfall / Warning Code</th>
                    <th>Description</th>
                    <th>Source File</th>
                    <th>Automated</th>
                </tr>
            </thead>
        </table>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            fetch('summary_pitfalls_warnings.json')
                .then(response => {
                    if (!response.ok) {
                        throw new Error('Network response was not ok');
                    }
                    return response.json();
                })
                .then(data => {
                    const table = document.querySelector('#pitfallsTable');
                    
                    for (const [repoId, repoData] of Object.entries(data)) {
                        const url = repoData.url || 'Unknown URL';
                        
                        const pEntries = repoData.pitfalls ? Object.entries(repoData.pitfalls) : [];
                        const wEntries = repoData.warnings ? Object.entries(repoData.warnings) : [];
                        const totalRows = pEntries.length + wEntries.length;
                        
                        if (totalRows === 0) continue;
                        
                        const tbody = document.createElement('tbody');
                        let isFirstContext = true;
                        
                        for (const [code, info] of pEntries) {
                            addRow(tbody, url, code, info, 'p', isFirstContext, totalRows);
                            isFirstContext = false;
                        }
                        for (const [code, info] of wEntries) {
                            addRow(tbody, url, code, info, 'w', isFirstContext, totalRows);
                            isFirstContext = false;
                        }
                        
                        table.appendChild(tbody);
                    }
                })
                .catch(error => {
                    console.error('Error loading the JSON data:', error);
                    const table = document.querySelector('#pitfallsTable');
                    table.innerHTML += `<tbody><tr><td colspan="5" style="text-align: center; color: red;">Error loading data. Please ensure you are viewing this file via a local server.</td></tr></tbody>`;
                });
        });

        function addRow(tbody, url, code, info, type, isFirstContext, totalRows) {
            const tr = document.createElement('tr');
            
            if (isFirstContext) {
                const tdRepo = document.createElement('td');
                const aRepo = document.createElement('a');
                aRepo.href = url;
                aRepo.textContent = url;
                aRepo.className = 'repo-link';
                aRepo.target = '_blank';
                tdRepo.appendChild(aRepo);
                tdRepo.rowSpan = totalRows;
                tr.appendChild(tdRepo);
            }
            
            // Code Column
            const tdCode = document.createElement('td');
            const spanCode = document.createElement('span');
            spanCode.textContent = code;
            spanCode.className = `code-badge code-${type}`;
            tdCode.appendChild(spanCode);
            
            // Description Column
            const tdDesc = document.createElement('td');
            if (info.description && info.description !== "No description available") {
                tdDesc.textContent = info.description;
                tdDesc.className = 'desc-text';
            } else {
                tdDesc.textContent = '';
            }
            
            // Source File Column
            const tdSource = document.createElement('td');
            tdSource.textContent = info.source_file || 'Unknown';
            
            // Automated Column
            const tdAutomated = document.createElement('td');
            tdAutomated.textContent = 'Yes';
            
            tr.appendChild(tdCode);
            tr.appendChild(tdDesc);
            tr.appendChild(tdSource);
            tr.appendChild(tdAutomated);
            
            tbody.appendChild(tr);
        }
    </script>
</body>
</html>
